name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cardwise
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/cardwise"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/cardwise"
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm run test:run

      - name: Build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/cardwise"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/cardwise"
          NEXTAUTH_SECRET: "ci-build-secret-min-32-characters-long"
          NEXTAUTH_URL: "http://localhost:3000"
        run: npm run build
